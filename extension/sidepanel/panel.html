<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="app_name">BLOG BenchMarker</title>
  <link rel="stylesheet" href="panel.css" />
</head>
<body>
  <header class="bm-header">
    <h1 class="bm-title" data-i18n="app_name">BLOG BenchMarker</h1>
  </header>

  <nav class="bm-tabs" role="tablist" data-i18n-aria="tabs_aria_label" aria-label="기능 탭">
    <button class="bm-tab is-active" role="tab" data-tab="analyze"   aria-selected="true"  data-i18n="tab_analyze">분석</button>
    <button class="bm-tab" role="tab" data-tab="benchmark" aria-selected="false" data-i18n="tab_benchmark">벤치마크</button>
    <button class="bm-tab" role="tab" data-tab="generate"  aria-selected="false" data-i18n="tab_generate">생성</button>
    <button class="bm-tab" role="tab" data-tab="mypage"    aria-selected="false" data-i18n="tab_mypage">마이</button>
  </nav>

  <main class="bm-panels">
    <section class="bm-panel is-active" role="tabpanel" data-panel="analyze"   data-i18n-aria="tab_analyze"   aria-label="분석">
      <!-- Phase 2.x 에서 analyze-tab.js 가 렌더 -->
      <p class="bm-placeholder" data-i18n="placeholder_analyze">분석 탭 (골격)</p>
    </section>

    <section class="bm-panel" role="tabpanel" data-panel="benchmark" data-i18n-aria="tab_benchmark" aria-label="벤치마크" hidden>
      <!-- Phase 4.x 에서 benchmark-tab.js 가 렌더 -->
      <p class="bm-placeholder" data-i18n="placeholder_benchmark">벤치마크 탭 (골격)</p>
    </section>

    <section class="bm-panel" role="tabpanel" data-panel="generate"  data-i18n-aria="tab_generate"  aria-label="생성" hidden>
      <!-- Phase 3.x 에서 generate-tab.js 가 렌더 -->
      <p class="bm-placeholder" data-i18n="placeholder_generate">생성 탭 (골격)</p>
    </section>

    <section class="bm-panel" role="tabpanel" data-panel="mypage"    data-i18n-aria="tab_mypage"    aria-label="마이" hidden>
      <!-- Phase 5.x 에서 settings/mypage 탭이 렌더 -->
      <p class="bm-placeholder" data-i18n="placeholder_mypage">마이 탭 (골격)</p>
    </section>
  </main>

  <script type="module">
    import { initI18n } from '../lib/utils/i18n.js'
    initI18n().catch((e) => console.warn('[i18n/panel] init failed', e?.message))
  </script>
  <script type="module" src="panel.js"></script>
</body>
</html>
