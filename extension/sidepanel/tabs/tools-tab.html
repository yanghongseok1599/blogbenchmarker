<!-- extension/sidepanel/tabs/tools-tab.html
     부가 도구 탭 마크업 조각. panel.js 가 mount(container) 호출 시 tools-tab.js 가 fetch 로 주입.
     각 도구는 자기 슬롯에 렌더된다(tools-tab.js 가 createXxxCard() 반환 노드를 append). -->
<div class="bm-tools">

  </header>

  <div class="bm-tools__slot" data-slot="counter" aria-label="글자 수 카운터"></div>
  <div class="bm-tools__slot" data-slot="pomodoro" aria-label="뽀모도로 타이머"></div>
