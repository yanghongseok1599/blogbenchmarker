<!--
  generate-tab.html — Phase 5.2 AI 생성 탭 마크업 참조본
  ────────────────────────────────────────────────────────────
  본 파일은 panel.html 에 직접 include 되지 않는다. 실제 DOM 은
  sidepanel/tabs/generate-tab.js 의 buildGenerateTabDOM() 이 dom-safe.createEl
  로 동등하게 조립한다. 인간 리뷰·구조 추적·테스트 스냅샷 기준.
-->
<section class="bm-generate" data-tab-content="generate">

  <header class="bm-generate__head">
    <h2 class="bm-generate__title">AI 글 생성</h2>
    <p class="bm-generate__hint">
      주제와 옵션을 입력하면 Gemini 2.5 Flash 가 초안을 작성합니다.
    </p>
  </header>

  <form class="bm-generate__form" data-role="generate-form" autocomplete="off">

    <label class="bm-generate__field">
      <span class="bm-generate__label">주제 (필수)</span>
      <input
        type="text"
        class="bm-input"
        name="topic"
        data-role="topic"
        maxlength="500"
        placeholder="예: 초보 개발자에게 추천하는 VSCode 단축키 10가지"
        required
      />
    </label>

    <label class="bm-generate__field">
      <span class="bm-generate__label">
        원본 보존도 <span data-role="originality-value">50</span>
      </span>
      <input
        type="range"
        class="bm-range"
        name="originality"
        data-role="originality"
        min="0" max="100" step="1" value="50"
      />
      <span class="bm-generate__hint-inline">
        0 = 원본 보존 · 50 = 리믹스 · 100 = 창의적
      </span>
    </label>

    <label class="bm-generate__field">
      <span class="bm-generate__label">분량</span>
      <select class="bm-select" name="length" data-role="length">
        <option value="short">짧게</option>
        <option value="medium" selected>보통</option>
        <option value="long">길게</option>
      </select>
    </label>

    <label class="bm-generate__field">
      <span class="bm-generate__label">추가 요청 (선택)</span>
      <textarea
        class="bm-textarea"
        name="extraNotes"
        data-role="extra-notes"
        maxlength="500"
        rows="3"
        placeholder="말투, 구조, 금지어 등"
      ></textarea>
    </label>

    <label class="bm-generate__checkbox">
      <input type="checkbox" name="useLearning" data-role="use-learning" />
      <span>내 학습 데이터를 참고 (최근 3개)</span>
    </label>

    <button type="submit" class="bm-btn bm-btn--primary" data-action="generate-submit">
      생성
    </button>
  </form>

  <div class="bm-generate__status" data-role="status" hidden role="status" aria-live="polite">
    <!-- 진행 / 에러 메시지 슬롯 -->
  </div>

  <div class="bm-generate__result" data-role="result">
    <!-- generate-result-card 가 append 되는 슬롯 -->
  </div>

</section>
