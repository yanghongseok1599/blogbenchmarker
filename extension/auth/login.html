<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 — BLOG BenchMarker</title>
  <!-- TODO(CSP): MV3 extension_pages CSP(script-src 'self')로 Play CDN이 차단됩니다. 배포 전 로컬 컴파일된 Tailwind 번들로 교체 필요. -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* CSP로 CDN이 차단되어도 최소 가독성은 유지되도록 폴백 스타일 */
    body { font-family: -apple-system, "Noto Sans KR", sans-serif; background: #f8fafc; color: #0f172a; margin: 0; }
    .fallback-card { max-width: 420px; margin: 48px auto; padding: 32px; background: #fff; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.06); }
    .fallback-input { width: 100%; padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
    .fallback-btn { width: 100%; padding: 12px; border: 0; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 14px; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">
  <main class="fallback-card bg-white w-full max-w-md rounded-xl shadow-md p-8">
    <header class="mb-6 text-center">
      <h1 class="text-2xl font-bold text-slate-900">BLOG BenchMarker</h1>
      <p class="text-sm text-slate-500 mt-1">로그인 후 블로그 분석을 시작하세요</p>
    </header>

    <form id="login-form" class="space-y-4" novalidate>
      <div>
        <label for="email" class="block text-sm font-medium text-slate-700 mb-1">이메일</label>
        <input
          type="email"
          id="email"
          name="email"
          class="fallback-input w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="you@example.com"
          autocomplete="email"
          required
        />
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-slate-700 mb-1">비밀번호</label>
        <input
          type="password"
          id="password"
          name="password"
          class="fallback-input w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="8자 이상"
          autocomplete="current-password"
          minlength="8"
          required
        />
      </div>

      <div id="message" class="text-sm hidden" role="alert" aria-live="polite"></div>

      <button
        type="submit"
        id="submit-btn"
        class="fallback-btn w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-md transition"
        style="background:#2563eb;color:#fff;"
      >
        로그인
      </button>
    </form>

    <div class="my-6 flex items-center gap-3">
      <div class="flex-1 h-px bg-slate-200"></div>
      <span class="text-xs text-slate-400">또는</span>
      <div class="flex-1 h-px bg-slate-200"></div>
    </div>

    <button
      type="button"
      id="google-btn"
      class="fallback-btn w-full border border-slate-300 bg-white hover:bg-slate-50 text-slate-700 font-semibold py-2.5 rounded-md flex items-center justify-center gap-2"
      style="background:#fff;border:1px solid #cbd5e1;color:#334155;"
    >
      <span aria-hidden="true">🔗</span>
      <span>Google로 계속하기</span>
    </button>

    <nav class="mt-6 text-center text-sm text-slate-600 space-x-3">
      <a href="signup.html" class="text-blue-600 hover:underline">회원가입</a>
      <span class="text-slate-300">·</span>
      <a href="reset.html" class="text-blue-600 hover:underline">비밀번호 찾기</a>
    </nav>
  </main>

  <script type="module" src="login.js"></script>
</body>
</html>
