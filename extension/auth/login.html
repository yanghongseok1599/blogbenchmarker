<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 — BLOG BenchMarker</title>
  <link rel="stylesheet" href="auth.css" />
</head>
<body class="auth-body">
  <main class="auth-card">
    <header class="auth-header">
      <h1 class="auth-title">BLOG BenchMarker</h1>
      <p class="auth-subtitle">로그인 후 블로그 분석을 시작하세요</p>
    </header>

    <form id="login-form" class="auth-form" novalidate>
      <div class="auth-field">
        <label class="auth-label" for="email">이메일</label>
        <input
          class="auth-input"
          type="email"
          id="email"
          name="email"
          placeholder="you@example.com"
          autocomplete="email"
          required
        />
      </div>

      <div class="auth-field">
        <label class="auth-label" for="password">비밀번호</label>
        <input
          class="auth-input"
          type="password"
          id="password"
          name="password"
          placeholder="8자 이상"
          autocomplete="current-password"
          minlength="8"
          maxlength="72"
          required
        />
      </div>

      <div id="message" class="auth-message" role="alert" aria-live="polite" hidden></div>

      <button type="submit" id="submit-btn" class="auth-btn auth-btn--primary">로그인</button>
    </form>

    <div class="auth-divider"><span>또는</span></div>

    <button type="button" id="google-btn" class="auth-btn auth-btn--secondary">
      <span aria-hidden="true">🔗</span>
      <span>Google로 계속하기</span>
    </button>

    <nav class="auth-links">
      <a href="signup.html" class="auth-link">회원가입</a>
      <span class="auth-links-separator">·</span>
      <a href="reset.html" class="auth-link">비밀번호 찾기</a>
    </nav>
  </main>

  <script type="module" src="login.js"></script>
</body>
</html>
