<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="app_name">로그인 — BLOG BenchMarker</title>
  <link rel="stylesheet" href="auth.css" />
</head>
<body class="auth-body">
  <main class="auth-card">
    <header class="auth-header">
      <h1 class="auth-title" data-i18n="auth_brand_title">BLOG BenchMarker</h1>
      <p class="auth-subtitle" data-i18n="auth_login_title">로그인 후 블로그 분석을 시작하세요</p>
    </header>

    <form id="login-form" class="auth-form" novalidate>
      <div class="auth-field">
        <label class="auth-label" for="email" data-i18n="auth_field_email_label">이메일</label>
        <input
          class="auth-input"
          type="email"
          id="email"
          name="email"
          placeholder="you@example.com"
          data-i18n-attr="placeholder:auth_field_email_placeholder"
          autocomplete="email"
          required
        />
      </div>

      <div class="auth-field">
        <label class="auth-label" for="password" data-i18n="auth_field_password_label">비밀번호</label>
        <input
          class="auth-input"
          type="password"
          id="password"
          name="password"
          placeholder="8자 이상"
          data-i18n-attr="placeholder:auth_field_password_placeholder_login"
          autocomplete="current-password"
          minlength="8"
          maxlength="72"
          required
        />
      </div>

      <div id="message" class="auth-message" role="alert" aria-live="polite" hidden></div>

      <button type="submit" id="submit-btn" class="auth-btn auth-btn--primary" data-i18n="auth_login_submit">로그인</button>
    </form>

    <div class="auth-divider"><span data-i18n="common_or">또는</span></div>

    <button type="button" id="google-btn" class="auth-btn auth-btn--secondary auth-btn--google">
      <span data-i18n="auth_login_google">Google로 계속하기</span>
    </button>

    <nav class="auth-links">
      <a href="signup.html" class="auth-link" data-i18n="auth_login_link_signup">회원가입</a>
      <span class="auth-links-separator">·</span>
      <a href="reset.html" class="auth-link" data-i18n="auth_login_link_reset">비밀번호 찾기</a>
    </nav>
  </main>
    <script type="module">
    import { initI18n } from '../lib/utils/i18n.js'
    initI18n().catch((e) => console.warn('[i18n/login] init failed', e?.message))
  </script>
  <script type="module" src="login.js"></script>
</body>
</html>
