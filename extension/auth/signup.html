<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="auth_signup_title">회원가입 — BLOG BenchMarker</title>
  <link rel="stylesheet" href="auth.css" />
</head>
<body class="auth-body">
  <main class="auth-card">
    <header class="auth-header">
      <h1 class="auth-title" data-i18n="auth_signup_title">회원가입</h1>
      <p class="auth-subtitle" data-i18n="auth_signup_subtitle">이메일로 빠르게 시작하세요</p>
    </header>

    <form id="signup-form" class="auth-form" novalidate>
      <div class="auth-field">
        <label class="auth-label" for="email" data-i18n="auth_field_email_label">이메일</label>
        <input
          class="auth-input"
          type="email"
          id="email"
          name="email"
          placeholder="you@example.com"
          data-i18n-attr="placeholder:auth_field_email_placeholder"
          autocomplete="email"
          required
        />
      </div>

      <div class="auth-field">
        <label class="auth-label" for="password" data-i18n="auth_field_password_label">비밀번호</label>
        <input
          class="auth-input"
          type="password"
          id="password"
          name="password"
          placeholder="8자 이상, 영문+숫자 조합"
          data-i18n-attr="placeholder:auth_field_password_placeholder_signup"
          autocomplete="new-password"
          minlength="8"
          maxlength="72"
          required
        />
      </div>

      <div class="auth-field">
        <label class="auth-label" for="password-confirm" data-i18n="auth_field_password_confirm_label">비밀번호 확인</label>
        <input
          class="auth-input"
          type="password"
          id="password-confirm"
          name="password-confirm"
          placeholder="비밀번호 재입력"
          data-i18n-attr="placeholder:auth_field_password_confirm_placeholder"
          autocomplete="new-password"
          minlength="8"
          maxlength="72"
          required
        />
      </div>

      <label class="auth-terms">
        <input type="checkbox" id="terms" required />
        <span>
          <a href="#" class="auth-link" data-i18n="auth_signup_terms_prefix">이용약관</a> <span data-i18n="auth_signup_terms_and">및</span>
          <a href="#" class="auth-link" data-i18n="auth_signup_terms_privacy">개인정보 처리방침</a><span data-i18n="auth_signup_terms_suffix">에 동의합니다.</span>
        </span>
      </label>

      <div id="message" class="auth-message" role="alert" aria-live="polite" hidden></div>

      <button type="submit" id="submit-btn" class="auth-btn auth-btn--primary" data-i18n="auth_signup_submit">가입하기</button>
    </form>

    <section id="verify-notice" class="auth-notice auth-notice--info" aria-live="polite" hidden>
      <p class="auth-notice-title" data-i18n="auth_signup_verify_title">이메일을 확인해 주세요</p>
      <p class="auth-notice-body" data-i18n="auth_signup_verify_body">입력하신 주소로 인증 메일을 보냈습니다. 메일의 링크를 클릭하면 가입이 완료됩니다.</p>
    </section>

    <p class="auth-links">
      <span data-i18n="auth_signup_has_account">이미 계정이 있으신가요?</span>
      <a href="login.html" class="auth-link" data-i18n="auth_signup_link_login">로그인</a>
    </p>
  </main>

  <script src="../lib/vendor/supabase.umd.min.js"></script>
  <script type="module">
    import { initI18n } from '../lib/utils/i18n.js'
    initI18n().catch((e) => console.warn('[i18n/signup] init failed', e?.message))
  </script>
  <script type="module" src="signup.js"></script>
</body>
</html>
