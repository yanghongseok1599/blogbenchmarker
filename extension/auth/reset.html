<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="auth_reset_title">비밀번호 재설정 — BLOG BenchMarker</title>
  <link rel="stylesheet" href="auth.css" />
</head>
<body class="auth-body">
  <main class="auth-card">
    <header class="auth-header">
      <h1 class="auth-title" data-i18n="auth_reset_title">비밀번호 재설정</h1>
      <p class="auth-subtitle" data-i18n="auth_reset_subtitle">가입하신 이메일로 재설정 링크를 보내드립니다</p>
    </header>

    <form id="reset-form" class="auth-form" novalidate>
      <div class="auth-field">
        <label class="auth-label" for="email" data-i18n="auth_field_email_label">이메일</label>
        <input
          class="auth-input"
          type="email"
          id="email"
          name="email"
          placeholder="you@example.com"
          data-i18n-attr="placeholder:auth_field_email_placeholder"
          autocomplete="email"
          required
        />
      </div>

      <div id="message" class="auth-message" role="alert" aria-live="polite" hidden></div>

      <button type="submit" id="submit-btn" class="auth-btn auth-btn--primary" data-i18n="auth_reset_submit">재설정 메일 보내기</button>
    </form>

    <section id="sent-notice" class="auth-notice auth-notice--success" aria-live="polite" hidden>
      <p class="auth-notice-title" data-i18n="auth_reset_sent_title">메일을 전송했습니다</p>
      <p class="auth-notice-body" data-i18n="auth_reset_sent_body">입력하신 주소로 재설정 링크를 보냈습니다. 메일이 도착하지 않으면 스팸함도 확인해 주세요.</p>
    </section>

    <p class="auth-links">
      <a href="login.html" class="auth-link" data-i18n="auth_reset_link_back">로그인으로 돌아가기</a>
    </p>
  </main>

  <script src="../lib/vendor/supabase.umd.min.js"></script>
  <script type="module">
    import { initI18n } from '../lib/utils/i18n.js'
    initI18n().catch((e) => console.warn('[i18n/reset] init failed', e?.message))
  </script>
  <script type="module" src="reset.js"></script>
</body>
</html>
